name: Smoke Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests & generate Allure report
        run: npm run smoke:allure

      - name: Upload Allure HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-report
          path: allure-report
