name: Smoke Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  smoke:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm install -g allure-commandline --save-dev
      - run: npm run smoke:ci

      # Prepare report for deployment
      - run: mkdir smoke && mv allure-report smoke/
      - run: |
          cat > index.html << 'EOF'
          <html><body><h1>Allure Smoke Report</h1><a href="smoke/">View Report</a></body></html>
          EOF
      - run: mkdir temp && mv smoke temp/ && mv index.html temp/      - run: ls -la temp/
      # Upload report artifact
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4