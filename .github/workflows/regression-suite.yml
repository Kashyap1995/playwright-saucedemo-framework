name: Regression Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests & generate Allure report
        run: npm run regression:allure

      - name: Upload Allure HTML report artifact
        uses: actions/upload-artifact@v3
        with:
          name: regression-allure-report
          path: allure-report
