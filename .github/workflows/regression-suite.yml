name: Regression Suite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'   # Runs daily ~11:30 PM IST

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  regression:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      - name: Run Regression Tests
        run: npm run regression:ci

      - name: Generate Allure Report
        if: always()
        run: allure generate ./allure-results --clean -o ./allure-report

      # Prepare report for deployment
      - run: mkdir regression && mv allure-report regression/
      - run: |
          cat > index.html << 'EOF'
          <html><body><h1>Allure Regression Report</h1><a href="regression/">View Report</a></body></html>
          EOF
      - run: mkdir temp && mv regression temp/ && mv index.html temp/

      - name: Upload Allure HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-allure-report
          path: temp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4